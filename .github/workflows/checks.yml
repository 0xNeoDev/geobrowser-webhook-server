name: Checks

on:
  push:
  pull_request:

# Static checks: lint, typecheck, and a build smoke. No services needed.
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Lint (Biome)
        run: bun run lint
      - name: Typecheck (tsc)
        run: bun run check
      - name: Build
        run: bun run build
