# TEMPLATE ONLY — do not commit real values. Create the real Secret manually
# (see README.md). All keys are injected into the app via `envFrom`.
apiVersion: v1
kind: Secret
metadata:
  name: geobrowser-webhook-server-secrets
  namespace: geo-notifications
type: Opaque
stringData:
  # Shared managed Postgres (app-db). Use this app's own database + role.
  DATABASE_URL: "postgres://USER:PASSWORD@app-db-host:25060/geobrowser_notifications?sslmode=require"
  DB_POOL_MAX: "10"

  # Must equal this app's row `secret` in gaia's `app_webhooks` table.
  # Generate: openssl rand -hex 32
  GEO_WEBHOOK_SECRET: "<hmac-secret>"

  # Privy (same Privy app as the Geo Browser front-end).
  PRIVY_APP_ID: "<privy-app-id>"
  PRIVY_APP_SECRET: "<privy-app-secret>"
  # Recommended: Privy's ES256 verification key (public). Tokens then verify
  # offline; the app secret stays off the per-request path (used only at /users).
  PRIVY_VERIFICATION_KEY: "<privy-es256-public-verification-key>"

  # Email (optional — omit MAILERSEND_API_KEY to run in-app only).
  MAILERSEND_API_KEY: "<mailersend-token>"
  MAILERSEND_FROM_EMAIL: "notifications@geobrowser.io"
  EMAIL_MAX_PER_RECIPIENT_PER_HOUR: "0"
